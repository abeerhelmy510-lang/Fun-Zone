<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الألعاب العالمية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0b0e14; color: white; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #ff4757; font-size: 2.5em; text-shadow: 2px 2px #000; }
        
        /* تصميم شبكة الألعاب */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        /* تصميم كرت اللعبة */
        .game-card {
            background: #1e272e;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
            text-align: center;
        }

        .game-card:hover {
            transform: scale(1.08);
            border-color: #ff4757;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }

        .game-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .game-card h3 {
            margin: 10px 0;
            font-size: 1.1em;
        }

        /* حاوية اللعبة عند الفتح */
        #game-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        iframe { width: 80%; height: 80%; border: 5px solid #fff; border-radius: 10px; }
        .close-btn { margin-bottom: 10px; padding: 10px 20px; background: #ff4757; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎮 Game Universe | عالم الألعاب 🎮</h1>

    <div class="game-grid">
        <div class="game-card" onclick="openGame('https://www.google.com/logos/2010/pacman10-i.html')">
            <img src="https://logodix.com/logo/18526.png" alt="Pacman">
            <h3>باك مان الكلاسيكية</h3>
        </div>

        <div class="game-card" onclick="openGame('https://playtictactoe.org/')">
            <img src="https://play-lh.googleusercontent.com/399008889898.png" alt="XO">
            <h3>لعبة التحدي XO</h3>
        </div>

        <div class="game-card" onclick="openGame('https://poki.com/en/g/temple-run-2')">
            <img src="https://play-lh.googleusercontent.com/9998888.png" alt="Temple Run">
            <h3>تمبل رن (Poki)</h3>
        </div>

        <div class="game-card" onclick="openGame('https://slither.io/')">
            <img src="https://play-lh.googleusercontent.com/111222333.png" alt="Slither">
            <h3>لعبة الثعبان Slither</h3>
        </div>
    </div>

    <div id="game-screen">
        <button class="close-btn" onclick="closeGame()">❌ إغلاق والعودة للقائمة</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        function openGame(url) {
            document.getElementById('game-frame').src = url;
            document.getElementById('game-screen').style.display = 'flex';
        }

        function closeGame() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>

</body>
</html>

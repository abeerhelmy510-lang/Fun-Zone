<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Universe | عالم الألعاب</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #38bdf8; font-size: 2.2em; margin-bottom: 30px; text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .game-card { 
            background: #1e293b; border-radius: 20px; padding: 20px 10px; cursor: pointer; 
            transition: 0.3s; border: 1px solid #334155; text-align: center; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .game-card:hover { transform: translateY(-8px); border-color: #38bdf8; background: #334155; }
        
        .game-icon { font-size: 50px; margin-bottom: 10px; display: block; }
        .game-card h3 { font-size: 1em; margin: 0; color: #f1f5f9; }

        #game-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; flex-direction: column; 
        }
        
        iframe { width: 100%; flex-grow: 1; border: none; background: white; }
        
        .close-btn { 
            padding: 15px; background: #ef4444; color: white; border: none; 
            cursor: pointer; font-weight: bold; font-size: 1.1em; 
        }
    </style>
</head>
<body>

    <h1>🎮 Game Universe | عالم الألعاب </h1>

    <div class="game-grid">
        <div class="game-card" onclick="openGame('https://play2048.co/')">
            <span class="game-icon">🔢</span>
            <h3>لعبة 2048</h3>
        </div>

        <div class="game-card" onclick="openGame('https://www.google.com/logos/2010/pacman10-i.html')">
            <span class="game-icon">🟡</span>
            <h3>باك مان</h3>
        </div>

        <div class="game-card" onclick="openGame('https://playtictactoe.org/')">
            <span class="game-icon">❌</span>
            <h3>تحدي XO</h3>
        </div>

        <div class="game-card" onclick="openGame('https://muro.io/')">
            <span class="game-icon">🎹</span>
            <h3>عزف البيانو</h3>
        </div>

        <div class="game-card" onclick="openGame('https://chromedino.com/')">
            <span class="game-icon">🦖</span>
            <h3>ديناصور القفز</h3>
        </div>

        <div class="game-card" onclick="openGame('https://www.onlinetcoloring.com/coloring-pages/mandala/')">
            <span class="game-icon">🎨</span>
            <h3>عالم التلوين</h3>
        </div>

        <div class="game-card" onclick="openGame('https://m.girlsgogames.com/games/cooking')">
            <span class="game-icon">🍳</span>
            <h3>مطبخ البنات</h3>
        </div>

        <div class="game-card" onclick="openGame('https://m.girlsgogames.com/games/dress_up')">
            <span class="game-icon">👗</span>
            <h3>تلبيس ومكياج</h3>
        </div>
    </div>

    <div id="game-screen">
        <button class="close-btn" onclick="closeGame()">❌ إغلاق والعودة للقائمة</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        function openGame(url) {
            document.getElementById('game-frame').src = url;
            document.getElementById('game-screen').style.display = 'flex';
        }
        function closeGame() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>

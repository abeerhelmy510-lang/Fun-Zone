<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Station | محطة الألعاب</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #07090e; color: white; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 20px; background: linear-gradient(45deg, #ff4757, #70a1ff); border-radius: 15px; margin-bottom: 30px; }
        
        /* شبكة الألعاب احترافية */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background: #1e272e;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid #2f3542;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.1);
            border-color: #ff4757;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }

        .icon { font-size: 45px; display: block; margin-bottom: 10px; }
        h3 { font-size: 0.9em; margin: 0; color: #ced4da; }

        /* شاشة عرض اللعبة (Full Screen) */
        #gameOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
        }

        .nav-bar {
            background: #1e272e;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎮 Game Station 🎮</h1>
    <p>ألعاب مجانية كتيييير تفتح فوراً</p>
</div>

<div class="game-grid">
    <div class="card" onclick="play('https://games.mizadev.com/hextris/')">
        <span class="icon">🔷</span><h3>تحدي الأشكال</h3>
    </div>
    <div class="card" onclick="play('https://games.mizadev.com/pacman/')">
        <span class="icon">🟡</span><h3>باك مان</h3>
    </div>
    <div class="card" onclick="play('https://games.mizadev.com/snake/')">
        <span class="icon">🐍</span><h3>الثعبان</h3>
    </div>

    <div class="card" onclick="play('https://play2048.co/')">
        <span class="icon">🔢</span><h3>لعبة 2048</h3>
    </div>
    <div class="card" onclick="play('https://games.mizadev.com/sudoku/')">
        <span class="icon">🧩</span><h3>سودوكو</h3>
    </div>

    <div class="card" onclick="play('https://www.onlinetcoloring.com/coloring-pages/mandala/')">
        <span class="icon">🎨</span><h3>تلوين مريح</h3>
    </div>
    <div class="card" onclick="play('https://m.girlsgogames.com/game/cooking-korean-lesson')">
        <span class="icon">🍳</span><h3>مطبخ كوري</h3>
    </div>
    <div class="card" onclick="play('https://m.girlsgogames.com/game/princess-ready-for-christmas')">
        <span class="icon">👗</span><h3>تلبيس أميرات</h3>
    </div>

    <div class="card" onclick="play('https://playtictactoe.org/')">
        <span class="icon">❌</span><h3>لعبة XO</h3>
    </div>
    <div class="card" onclick="play('https://muro.io/')">
        <span class="icon">🎹</span><h3>بيانو سحري</h3>
    </div>
</div>

<div id="gameOverlay">
    <div class="nav-bar">
        <span id="gameTitle">جاري التحميل...</span>
        <button class="close-btn" onclick="closeGame()">إغلاق اللعبة ❌</button>
    </div>
    <iframe id="gameFrame" src=""></iframe>
</div>

<script>
    function play(url) {
        const overlay = document.getElementById('gameOverlay');
        const frame = document.getElementById('gameFrame');
        
        // مسح الكاش القديم عشان اللعبة متعلقش
        frame.src = ""; 
        
        setTimeout(() => {
            frame.src = url;
            overlay.style.display = "flex";
        }, 100);
    }

    function closeGame() {
        document.getElementById('gameOverlay').style.display = "none";
        document.getElementById('gameFrame').src = "";
    }
</script>

</body>
</html>

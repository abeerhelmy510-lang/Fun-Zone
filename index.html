<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Universe | عالم الألعاب</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0e14; color: white; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #ff4757; margin-bottom: 30px; text-shadow: 0 0 10px rgba(255, 71, 87, 0.5); }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .game-card { background: #1e272e; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 2px solid transparent; text-align: center; }
        .game-card:hover { transform: scale(1.05); border-color: #ff4757; }
        .game-card img { width: 100%; height: 110px; object-fit: cover; }
        .game-card h3 { font-size: 0.9em; margin: 10px 5px; }
        #game-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; }
        iframe { width: 100%; flex-grow: 1; border: none; background: white; }
        .close-btn { padding: 15px; background: #ff4757; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎮 Game Universe | عالم الألعاب 🎮</h1>

    <div class="game-grid">
        <div class="game-card" onclick="openGame('https://www.google.com/logos/2010/pacman10-i.html')">
            <img src="https://www.google.com/logos/2010/pacman10-hp.png">
            <h3>باك مان</h3>
        </div>
        <div class="game-card" onclick="openGame('https://playtictactoe.org/')">
            <img src="https://cdn-icons-png.flaticon.com/512/566/566294.png">
            <h3>تحدي XO</h3>
        </div>
        <div class="game-card" onclick="openGame('https://play2048.co/')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/2048_logo.svg/200px-2048_logo.svg.png">
            <h3>لعبة 2048</h3>
        </div>
        <div class="game-card" onclick="openGame('https://www.onlinetcoloring.com/coloring-pages/mandala/')">
            <img src="https://cdn-icons-png.flaticon.com/512/2970/2970785.png">
            <h3>لعبة تلوين</h3>
        </div>
        <div class="game-card" onclick="openGame('https://www.google.com/logos/2010/pacman10-i.html')">
            <img src="https://cdn-icons-png.flaticon.com/512/528/528076.png">
            <h3>الثعبان الجائع</h3>
        </div>
        <div class="game-card" onclick="openGame('https://muro.io/')">
            <img src="https://cdn-icons-png.flaticon.com/512/3259/3259441.png">
            <h3>عزف البيانو</h3>
        </div>
        <div class="game-card" onclick="openGame('https://sudoku.com/')">
            <img src="https://cdn-icons-png.flaticon.com/512/2436/2436636.png">
            <h3>سودوكو ذكاء</h3>
        </div>
        <div class="game-card" onclick="openGame('https://chromedino.com/')">
            <img src="https://cdn-icons-png.flaticon.com/512/2790/2790371.png">
            <h3>ديناصور القفز</h3>
        </div>
        <div class="game-card" onclick="openGame('https://tetris.com/play-tetris')">
            <img src="https://cdn-icons-png.flaticon.com/512/566/566312.png">
            <h3>تيتريس مكعبات</h3>
        </div>
        <div class="game-card" onclick="openGame('https://lichess.org/training')">
            <img src="https://cdn-icons-png.flaticon.com/512/3014/3014131.png">
            <h3>تدريب شطرنج</h3>
        </div>
        <div class="game-card" onclick="openGame('https://www.game-game.com/games/cooking/')">
            <img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png">
            <h3>ألعاب طبخ</h3>
        </div>
        <div class="game-card" onclick="openGame('https://www.dressup.com/')">
            <img src="https://cdn-icons-png.flaticon.com/512/194/194311.png">
            <h3>عالم التجميل</h3>
        </div>
    </div>

    <div id="game-screen">
        <button class="close-btn" onclick="closeGame()">❌ إغلاق والعودة للقائمة</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        function openGame(url) {
            document.getElementById('game-frame').src = url;
            document.getElementById('game-screen').style.display = 'flex';
        }
        function closeGame() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
